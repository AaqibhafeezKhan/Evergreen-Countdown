name: Update Countdown SVG

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-countdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate countdown SVG
        run: node generate-countdown.js
        env:
          TARGET_YEAR: 2027
          TARGET_LABEL: "2027"
