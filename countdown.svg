<svg
  xmlns="http://www.w3.org/2000/svg"
  width="860"
  height="220"
  viewBox="0 0 860 220"
  role="img"
  aria-label="Countdown to 2027: 265 days 12 hours 58 minutes 14 seconds"
>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .sep { animation: pulse 1s infinite; }
    .sec { filter: drop-shadow(0 0 5px #A855F7); }
    .progress-fill { position: relative; overflow: hidden; }
  </style>
  <rect width="860" height="220" fill="#0D1117"/>

  <rect x="0" y="0" width="860" height="3" fill="#A855F7"/>

  <text
    x="40"
    y="26"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="11"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="3"
  >COUNTDOWN TO 2027</text>

  <text
    x="820"
    y="26"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="9"
    fill="#8B949E"
    text-anchor="end"
    letter-spacing="1"
  >UPDATED Fri, 10 Apr 2026 11:01 UTC</text>

  
  <rect x="80" y="42" width="160" height="110" fill="#30363D" rx="0"/>
  <rect x="81" y="43" width="158" height="108" fill="#0D1117" rx="0"/>
  <text
    x="160"
    y="114"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="56"
    font-weight="800"
    fill="#A855F7"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >265</text>
  <text
    x="160"
    y="174"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="11"
    font-weight="700"
    fill="#8B949E"
    text-anchor="middle"
    letter-spacing="3"
  >DAYS</text>
  <g class="sep">
  <text x="250" y="102" font-family="JetBrains Mono, Courier New, monospace" font-size="28" font-weight="800" fill="#A855F7" text-anchor="middle">:</text></g>
  
  <rect x="260" y="42" width="160" height="110" fill="#30363D" rx="0"/>
  <rect x="261" y="43" width="158" height="108" fill="#0D1117" rx="0"/>
  <text
    x="340"
    y="114"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="56"
    font-weight="800"
    fill="#A855F7"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >12</text>
  <text
    x="340"
    y="174"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="11"
    font-weight="700"
    fill="#8B949E"
    text-anchor="middle"
    letter-spacing="3"
  >HOURS</text>
  <g class="sep">
  <text x="430" y="102" font-family="JetBrains Mono, Courier New, monospace" font-size="28" font-weight="800" fill="#A855F7" text-anchor="middle">:</text></g>
  
  <rect x="440" y="42" width="160" height="110" fill="#30363D" rx="0"/>
  <rect x="441" y="43" width="158" height="108" fill="#0D1117" rx="0"/>
  <text
    x="520"
    y="114"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="56"
    font-weight="800"
    fill="#A855F7"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >58</text>
  <text
    x="520"
    y="174"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="11"
    font-weight="700"
    fill="#8B949E"
    text-anchor="middle"
    letter-spacing="3"
  >MINUTES</text>
  <g class="sep">
  <text x="610" y="102" font-family="JetBrains Mono, Courier New, monospace" font-size="28" font-weight="800" fill="#A855F7" text-anchor="middle">:</text></g>
  <g class="sec">
  <rect x="620" y="42" width="160" height="110" fill="#30363D" rx="0"/>
  <rect x="621" y="43" width="158" height="108" fill="#0D1117" rx="0"/>
  <text
    x="700"
    y="114"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="56"
    font-weight="800"
    fill="#A855F7"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >14</text>
  <text
    x="700"
    y="174"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="11"
    font-weight="700"
    fill="#8B949E"
    text-anchor="middle"
    letter-spacing="3"
  >SECONDS</text></g>

  
  <rect x="40" y="188" width="780" height="6" fill="#30363D" rx="0"/>
  <rect x="40" y="188" width="213" height="6" fill="#A855F7" rx="0"/>
  <text
    x="40"
    y="180"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="9"
    fill="#8B949E"
    letter-spacing="1"
  >2026 ELAPSED</text>
  <text
    x="820"
    y="180"
    font-family="JetBrains Mono, Courier New, monospace"
    font-size="9"
    fill="#8B949E"
    text-anchor="end"
    letter-spacing="1"
  >27.2%</text>

  <defs>
    <linearGradient id="shimmerGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0" />
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0" />
    </linearGradient>
    <clipPath id="barClip">
      <rect x="40" y="188" width="213" height="6" rx="0" />
    </clipPath>
  </defs>
  <rect x="40" y="188" width="213" height="6" fill="url(#shimmerGrad)" clip-path="url(#barClip)">
    <animate attributeName="x" from="-213" to="213" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>